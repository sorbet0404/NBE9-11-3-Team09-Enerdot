spring:
  datasource:
    url: jdbc:mysql://localhost:3306/parkingdb?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        generate_statistics: true
        show_sql: true
        format_sql: true
        default_batch_fetch_size: 100
        dialect: org.hibernate.dialect.MySQLDialect
  logging:
    level:
      org.hibernate.stat: DEBUG

  jwt:
    # 주의: 실제 배포할 땐 아주 길고 복잡한 무작위 문자열을 써야 합니다! (최소 256비트 이상)
    secret: ${JWT_SECRET}
  profiles:
    active: local

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}